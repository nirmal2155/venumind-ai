version: '3.8'

services:
  # --- Backend API Gateway ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - venumind-network

  # --- Frontend Dev Server (Development Only) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - venumind-network

networks:
  venumind-network:
    driver: bridge
